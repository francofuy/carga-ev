workflows:
  ios-bare-shell:
    name: Carga EV - iOS (Fase C spike, XcodeGen + LiveActivityWidget vacio)
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.francofuy.cargaev"
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets (modo Capacitor, sin service worker, base "/")
        script: npm run build:capacitor
      - name: Sync Capacitor #1 (copia dist-capacitor a ios/App/App/public)
        # Necesario ANTES de generar el proyecto: puebla App/public con los assets web para
        # el folder reference que declara project.yml.
        script: npx cap sync ios
      - name: Generar el proyecto Xcode desde project.yml (XcodeGen)
        # El .xcodeproj ya no se versiona a mano: se genera acá a partir de
        # ios/App/project.yml, que declara el target App + LiveActivityWidget.
        script: |
          set -e
          brew install xcodegen
          cd ios/App && xcodegen generate
      - name: Sync Capacitor #2 (recién ahora puede linkear los plugins nativos)
        # cap sync necesita que project.pbxproj ya exista para poder escribir
        # CapApp-SPM/Package.swift con los plugins nativos (Geolocation, Local
        # Notifications) — en la sync #1 ese archivo todavía no existía (lo genera
        # XcodeGen), así que la escritura fallaba en silencio (log
        # "ENOENT ... project.pbxproj") y esos plugins quedaban sin linkear de
        # verdad, aunque el propio cap sync dijera "Found N Capacitor plugins".
        # Repetir cap sync acá (ya con el .xcodeproj generado) es lo que realmente
        # los agrega. Recopiar los assets web es una operación inofensiva/idempotente.
        script: npx cap sync ios
      - name: Archive .app SIN firma de Apple
        # No hay certificado que subir acá: con Apple ID gratis no existe firma vía el
        # portal de developer.apple.com (eso requiere Developer Program pago) ni vía
        # Xcode (no tenemos Mac). La firma real y gratuita la hace AltServer/Sideloadly
        # en el momento de instalar en el iPhone, usando tu Apple ID directamente. Acá
        # solo se compila el .app sin firmar; CODE_SIGNING_ALLOWED=NO evita que xcodebuild
        # busque un certificado/perfil que no existe.
        script: |
          set -e
          xcodebuild archive \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Empaquetar el .app en un .ipa (sin firmar)
        # xcodebuild -exportArchive exige firma incluso para exportar, así que el .ipa se
        # arma a mano: un .ipa es simplemente un .zip con el .app dentro de Payload/.
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$CM_BUILD_DIR/App.xcarchive/Products/Applications/App.app" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR" && zip -r CargaEV-unsigned.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/CargaEV-unsigned.ipa
    publishing:
      email:
        recipients:
          - cmferme@citeksoluciones.com
        notify:
          success: true
          failure: true
