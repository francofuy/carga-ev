name: App
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "iPhone Developer"
packages:
  CapApp-SPM:
    path: CapApp-SPM
targets:
  App:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: App
        excludes:
          - Info.plist
          - public
      # "public" (los assets web de Capacitor) tiene que copiarse como carpeta entera
      # (folder reference, preserva su estructura interna: public/index.html,
      # public/assets/...), no como grupo de archivos sueltos — si no, Xcode los
      # desarma en la raíz del bundle y Capacitor no encuentra su index.html al
      # arrancar (causó un crash instantáneo al abrir, encontrado en el spike).
      - path: App/public
        type: folder
      - path: Shared
    configFiles:
      Debug: ../debug.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.francofuy.cargaev
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    dependencies:
      - package: CapApp-SPM
      - target: LiveActivityWidget
        embed: true
      - sdk: ActivityKit.framework
      - sdk: CoreLocation.framework
      - sdk: UserNotifications.framework

  # Widget Extension de la Live Activity real (Dynamic Island + pantalla bloqueada) de una carga
  # en Casa — el spike de la Fase C (target vacío) ya confirmó que esto archiva y se instala bien
  # sin firma real de Apple en este pipeline; ver LiveActivityWidgetBundle.swift para el diseño.
  LiveActivityWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: LiveActivityWidget
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.francofuy.cargaev.LiveActivityWidget
        INFOPLIST_FILE: LiveActivityWidget/Info.plist
        SKIP_INSTALL: YES
    dependencies:
      - sdk: ActivityKit.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

schemes:
  App:
    build:
      targets:
        App: all
        LiveActivityWidget: all
    run:
      config: Debug
    archive:
      config: Release
